<!DOCTYPE html>
<html lang="en">
<head>

  <title>Gallery | BITFEST</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="gallery.css" />

<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">
        <span class="brand-mark">BF</span>
        <span class="brand-text">BITFEST</span>
      </a>
      <button class="nav-toggle" type="button" aria-label="Toggle navigation">Menu</button>
      <nav class="nav-links">
        <a href="index.html">Home</a>

        <a href="gallery.html" class="active">Gallery</a>

        <a href="dashboard.html" class="btn btn-ghost btn-small">Dashboard</a>
      </nav>
    </div>
  </header>

  <section class="gallery-hero">
    <div class="container">
      <p class="eyebrow">Gallery</p>
      <h1>BITFEST Moments</h1>
      <p>Snapshots from previous BITFEST celebrations. Replace with real event photos.</p>

      <figure class="gallery-card">
        <img src="https://images.unsplash.com/photo-1485217988980-11786ced9454?auto=format&fit=crop&w=900&q=80" alt="Students at event" />
        <div class="overlay">Hackathon Night</div>
      </figure>
      <figure class="gallery-card">
        <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=900&q=80" alt="Team collaboration" />
        <div class="overlay">Team Collaboration</div>
      </figure>
      <figure class="gallery-card">
        <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=900&q=80" alt="Workshop session" />
        <div class="overlay">Workshop Session</div>
      </figure>
      <figure class="gallery-card">
        <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=900&q=80" alt="Stage presentation" />

        <div class="overlay">Audience Energy</div>
      </figure>
      <figure class="gallery-card">
        <img src="https://images.unsplash.com/photo-1515168833906-d2a3b82b302a?auto=format&fit=crop&w=900&q=80" alt="Celebration" />
        <div class="overlay">Award Night</div>
