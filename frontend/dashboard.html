<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | BITFEST</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="responsive.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">
        <span class="brand-mark">BF</span>
        <span class="brand-text">BITFEST</span>
      </a>
      <button class="nav-toggle" type="button" aria-label="Toggle navigation">Menu</button>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="events.html">Events</a>
        <a href="gallery.html">Gallery</a>
        <a href="#" id="logoutBtn" class="btn btn-primary btn-small">Logout</a>
      </nav>
    </div>
  </header>

  <section class="dashboard-hero">
    <div class="container">
      <p class="eyebrow">Student dashboard</p>
      <h1>Welcome, <span id="userName">Student</span></h1>
      <p id="userEmail"></p>
      <div class="dashboard-grid">
        <div class="dashboard-card">
          <h3>Total registrations</h3>
          <p id="totalRegistrations">0</p>
        </div>
        <div class="dashboard-card">
          <h3>Payments completed</h3>
          <p id="paidCount">0</p>
        </div>
        <div class="dashboard-card">
          <h3>Certificates ready</h3>
          <p id="certificateCount">0</p>
        </div>
      </div>
    </div>
  </section>

  <section class="section section-light">
    <div class="container">
      <h2 class="section-title">Your events</h2>
      <div class="registrations" id="registrationsList"></div>
    </div>
  </section>

  <script src="script.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
